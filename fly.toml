app = "koala-muninndb"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "muninndb_data"
  destination = "/data"

[http_service]
  internal_port = 8750
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "performance-4x"
  memory = "8gb"
  cpu_kind = "performance"
  cpus = 4
